name: Update data and deploy public dashboard

on:
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"
      - "public/**"

  workflow_dispatch:

  schedule:
    - cron: "15 8 * * *"
      timezone: "Asia/Shanghai"

    - cron: "40 16 * * 1-5"
      timezone: "Asia/Shanghai"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: macroscope-pages
  cancel-in-progress: false

jobs:
  build:
    name: Update data and build website
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch and cache public data
        continue-on-error: true
        run: python scripts/update_data.py

      - name: Build static website
        run: python scripts/build_site.py

      - name: Save refreshed data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh public market data [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    name: Deploy public website
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
